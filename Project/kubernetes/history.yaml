apiVersion: apps/v1
kind: Deployment
metadata:
  name: history
spec:
  replicas: 2  # Multiple replicas — the Service load balances across all of them
  selector:
    matchLabels:
      app: history
  template:
    metadata:
      labels:
        app: history
    spec:
      containers:
        - name: history
          image: history:latest # This is the docker image we created
          imagePullPolicy: IfNotPresent  # Use locally built image rather than pulling from a registry
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: DB_USER # Get user and password from secrets
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: DB_URL
              value: postgresql://$(DB_USER):$(DB_PASSWORD)@db:5432/history  # $(VAR) is substituted by Kubernetes from the env vars defined above
            - name: RABBITMQ_URL
              value: amqp://rabbitmq  # "rabbitmq" resolves via the RabbitMQ Service
---
# Service: gives history a stable hostname so video-streaming can reach it
# via HISTORY_URL=http://history:5000
apiVersion: v1
kind: Service
metadata:
  name: history  # Hostname used in HISTORY_URL
spec:
  selector:
    app: history
  ports:
    - port: 5000
      targetPort: 5000