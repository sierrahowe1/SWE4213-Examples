# NOTE: This file should not be committed to git,
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-scripts  # Name used to reference this ConfigMap in postgres.yaml
data:
  # Each key becomes a filename when mounted into the postgres container.
  # Postgres automatically runs all .sql files in /docker-entrypoint-initdb.d on first startup.
  01-videos.sql: |
    CREATE DATABASE videos;
    \connect videos

    CREATE TABLE videos (
        id SERIAL PRIMARY KEY,
        title TEXT NOT NULL,
        url TEXT NOT NULL
    );

    INSERT INTO videos (title, url) VALUES
        ('Big Buck Bunny', 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s_1MB.mp4'),
        ('Jellyfish', 'https://test-videos.co.uk/vids/jellyfish/mp4/h264/360/Jellyfish_360_10s_1MB.mp4'),
        ('Sintel Trailer', 'https://test-videos.co.uk/vids/sintel/mp4/h264/360/Sintel_360_10s_1MB.mp4');

  02-history.sql: |
    CREATE DATABASE history;
    \connect history

    CREATE TABLE view_history (
        video_id INTEGER PRIMARY KEY,
        view_count INTEGER NOT NULL DEFAULT 0
    );